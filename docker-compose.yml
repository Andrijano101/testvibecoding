services:
  neo4j:
    image: neo4j:5.26-community
    container_name: srpska-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/changeme123}
      - NEO4J_PLUGINS=["apoc","graph-data-science"]
      - NEO4J_dbms_memory_heap_max__size=${NEO4J_HEAP_MAX:-4G}
      - NEO4J_dbms_memory_pagecache_size=${NEO4J_PAGECACHE:-2G}
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_default__listen__address=0.0.0.0
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - srpska-net

  backend:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.backend
    container_name: srpska-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme123}
      - NEO4J_MAX_POOL_SIZE=50
      - DATA_DIR=/app/data
      - SCRAPE_DELAY=${SCRAPE_DELAY:-2}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - ENABLE_SCHEDULER=${ENABLE_SCHEDULER:-false}
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - srpska-net

  frontend:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.frontend
    container_name: srpska-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - srpska-net

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  srpska-net:
    driver: bridge
